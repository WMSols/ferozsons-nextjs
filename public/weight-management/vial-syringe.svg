<svg width="900" height="700" viewBox="0 0 900 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="v" x1="250" y1="120" x2="520" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="b" x1="520" y1="130" x2="720" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BFE1FF"/>
      <stop offset="1" stop-color="#6FAEFF"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#0B3E7A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="900" height="700" fill="transparent"/>

  <!-- Vial -->
  <g filter="url(#sh)">
    <rect x="230" y="170" width="260" height="380" rx="46" fill="url(#v)"/>
    <rect x="250" y="145" width="220" height="70" rx="22" fill="#D7ECFF"/>
    <rect x="275" y="120" width="170" height="55" rx="18" fill="#A7D4FF"/>
    <rect x="265" y="320" width="190" height="10" rx="5" fill="#1F6EC9" fill-opacity="0.25"/>
    <rect x="265" y="360" width="150" height="10" rx="5" fill="#1F6EC9" fill-opacity="0.18"/>
  </g>

  <!-- Syringe -->
  <g filter="url(#sh)">
    <rect x="520" y="210" width="120" height="320" rx="26" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="540" y="240" width="80" height="210" rx="18" fill="url(#b)"/>
    <rect x="510" y="190" width="140" height="40" rx="18" fill="#EAF4FF"/>
    <rect x="555" y="520" width="50" height="90" rx="18" fill="#F5FAFF"/>
    <path d="M580 612 L580 660" stroke="#9BC7FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M580 660 L640 690" stroke="#9BC7FF" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
