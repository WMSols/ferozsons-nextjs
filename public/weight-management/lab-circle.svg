<svg width="900" height="900" viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="120" x2="760" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#BFDFFF"/>
    </linearGradient>
    <linearGradient id="glass" x1="260" y1="220" x2="640" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0B3E7A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="900" height="900" fill="url(#bg)"/>

  <!-- Abstract lab silhouettes -->
  <g filter="url(#shadow)">
    <rect x="180" y="220" width="540" height="460" rx="42" fill="url(#glass)"/>
    <circle cx="330" cy="380" r="70" fill="#2E6FB0" fill-opacity="0.25"/>
    <circle cx="540" cy="420" r="90" fill="#B23A9A" fill-opacity="0.18"/>
    <rect x="260" y="520" width="380" height="26" rx="13" fill="#1F6EC9" fill-opacity="0.20"/>
    <rect x="260" y="570" width="310" height="22" rx="11" fill="#1F6EC9" fill-opacity="0.14"/>
    <rect x="260" y="615" width="340" height="22" rx="11" fill="#1F6EC9" fill-opacity="0.12"/>
  </g>
</svg>
